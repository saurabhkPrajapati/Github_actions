name: Run Script

on:
  push:
    branches: [ main ]
  # pull_request:
  #   branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - uses: jannekem/run-python-script-action@v1
        with:
          script: |
            import os
            print("Directory contents:")
            for f in os.listdir():
                print(f)

      - name: Run Python script
        run: |
          python - <<EOF
          import os
          print("Directory contents:")
          for f in os.listdir():
              print(f)
          EOF

  test_muilple_platforms:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]    # these are ran in parallel
        python-version: ['3.10', '3.11', '3.12', '3.13'] 
        # these combinations will be tested in parallel
        # Ubuntu + Python 3.10, ubuntu + Python 3.11, Ubuntu + Python 3.12, Ubuntu + Python 3.13,
        # Windows + Python 3.10, Windows + Python 3.11, Windows + Python 3.12, Windows + Python 3.13

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout to push branch
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Python script
        run: |
          python -c "import os; print('Directory contents:'); [print(f) for f in os.listdir()]"
