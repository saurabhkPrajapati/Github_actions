name: Take dynamic filename and pass to job

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

  package:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      package-file: ${{ steps.step_123.outputs.package-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Publish package filename
        id: step_123
        run: |
          if [ -f tests/test_path_check.py ]; then
            echo "package-file=tests/test_path_check.py" >> "$GITHUB_OUTPUT"
          else
            echo "tests/test_path_check.py not found" >&2
            exit 1
          fi

  deploy:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Output package filename
        run: echo "${{ needs.package.outputs.package-file }}"

      - name: Deploy
        run: echo "Deploying Python package..."