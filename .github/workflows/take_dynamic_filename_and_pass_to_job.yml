name: Take dynamic filename and pass to job

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

  package:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      package-file: ${{ steps.step_123.outputs.package-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Publish package filename
        id: step_123
        run: |
          package_file=$(find tests -maxdepth 1 -type f -name "test_*.py" | head -n 1)
          if [ -n "$package_file" ]; then
            echo "package-file=$package_file" >> "$GITHUB_OUTPUT"
          else
            echo "No matching test file found in tests/" >&2
            exit 1
          fi

      - name: Upload package file
        uses: actions/upload-artifact@v4
        with:
          name: package-file
          path: ${{ steps.step_123.outputs.package-file }}

  deploy:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Output package filename
        run: echo "${{ needs.package.outputs.package-file }}"

      - name: Download package file
        uses: actions/download-artifact@v4
        with:
          name: package-file
          path: downloaded-file/

      - name: Show downloaded file
        run: |
          echo "Downloaded artifact: ${{ needs.package.outputs.package-file }}"
          ls -la downloaded-file/

      - name: Deploy
        run: echo "Deploying Python package..."